# Local dogfood config: run ruff and mildoc-lint's own gate before each commit.
# Install once:  pip install pre-commit && pre-commit install
# These hooks use the locally installed tools (no external revisions to pin).
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check
        language: system
        types: [python]
      - id: mildoc-lint-self
        name: mildoc-lint (self gate on examples)
        entry: python -m cds_mildoc lint
        language: system
        args: ["examples", "--profile", "all", "--fail-on", "blocker"]
        pass_filenames: false
