name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check .
      - run: python -m mypy
      - run: python -m pytest
      - run: mildoc-lint lint examples --profile all --format sarif --out mildoc-lint.sarif --fail-on blocker
      - uses: actions/upload-artifact@v4
        with:
          name: mildoc-lint-sarif
          path: mildoc-lint.sarif
