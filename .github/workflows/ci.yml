name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest
      - run: cds-mildoc lint examples --profile all --format sarif --out cds-mildoc.sarif --fail-on blocker
      - uses: actions/upload-artifact@v4
        with:
          name: cds-mildoc-sarif
          path: cds-mildoc.sarif
