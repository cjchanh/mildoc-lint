name: build-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            platform: linux
            arch: x64
          - label: windows-x64
            os: windows-latest
            platform: windows
            arch: x64
          - label: macos-x64
            os: macos-13
            platform: macos
            arch: x64
          - label: macos-arm64
            os: macos-14
            platform: macos
            arch: arm64

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate runner architecture
        shell: bash
        run: |
          python scripts/build_binary.py --validate-native-tags --platform-tag "${{ matrix.platform }}" --arch-tag "${{ matrix.arch }}"
      - run: python -m pip install -e ".[dev]"
      - run: python -m build
      - name: Install built wheel
        shell: bash
        run: |
          python - <<'PY'
          import platform
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {wheels}")

          smoke_root = Path(tempfile.mkdtemp(prefix="mildoc-wheel-smoke-"))
          venv_dir = smoke_root / "venv"
          subprocess.run([sys.executable, "-m", "venv", str(venv_dir)], check=True)

          windows = platform.system() == "Windows"
          bin_dir = venv_dir / ("Scripts" if windows else "bin")
          python = bin_dir / ("python.exe" if windows else "python")
          suffix = ".exe" if windows else ""
          mildoc_lint = bin_dir / f"mildoc-lint{suffix}"
          cds_mildoc = bin_dir / f"cds-mildoc{suffix}"

          subprocess.run([str(python), "-m", "pip", "install", str(wheels[0])], check=True)
          subprocess.run([str(mildoc_lint), "--version"], check=True, cwd=smoke_root)
          subprocess.run([str(cds_mildoc), "--version"], check=True, cwd=smoke_root)
          subprocess.run([str(python), "-I", "-m", "cds_mildoc", "--version"], check=True, cwd=smoke_root)
          PY
      - run: python -m pytest -q
      - run: ruff check .
      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected=$(python - <<'PY'
          from cds_mildoc._version import __version__

          print(f"v{__version__}")
          PY
          )
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "expected tag $expected but got $GITHUB_REF_NAME"
            exit 1
          fi
      - run: mildoc-lint --version
      - run: cds-mildoc --version
      - run: mildoc-lint lint examples --profile all --fail-on blocker
      - run: python scripts/build_binary.py --platform-tag "${{ matrix.platform }}" --arch-tag "${{ matrix.arch }}"
      - name: Validate artifact name
        shell: bash
        run: |
          artifact=$(python - <<'PY'
          from pathlib import Path
          folders = sorted(
              p.name for p in Path("dist").iterdir()
              if p.is_dir() and p.name.startswith("mildoc-lint-")
          )
          if len(folders) != 1:
              raise SystemExit(f"expected one artifact folder, found {folders}")
          print(folders[0])
          PY
          )
          expected="mildoc-lint-${{ matrix.label }}"
          if [ "$artifact" != "$expected" ]; then
            echo "expected $expected but built $artifact"
            exit 1
          fi
          echo "ARTIFACT_NAME=$artifact" >> "$GITHUB_ENV"
      - name: Smoke built executable
        shell: bash
        run: |
          exe=$(python - <<'PY'
          import platform
          from pathlib import Path

          artifact_dir = Path("dist") / "${{ env.ARTIFACT_NAME }}"
          exe_name = "mildoc-lint.exe" if platform.system() == "Windows" else "mildoc-lint"
          exe = artifact_dir / exe_name
          if not exe.is_file():
              raise SystemExit(f"built executable not found: {exe}")
          print(exe.as_posix())
          PY
          )
          "$exe" --version
          "$exe" lint examples --profile all --fail-on blocker
      - name: Package artifact
        shell: bash
        run: |
          python - <<'PY'
          import platform
          import shutil
          from pathlib import Path

          dist = Path("dist")
          release = Path("release")
          release.mkdir(exist_ok=True)
          folders = sorted(
              p for p in dist.iterdir()
              if p.is_dir() and p.name.startswith("mildoc-lint-")
          )
          if len(folders) != 1:
              raise SystemExit(f"expected one artifact folder, found {folders}")
          archive_format = "zip" if platform.system() == "Windows" else "gztar"
          archive_suffix = ".zip" if archive_format == "zip" else ".tar.gz"
          existing_archive = release / f"{folders[0].name}{archive_suffix}"
          if existing_archive.exists():
              existing_archive.unlink()
          archive = shutil.make_archive(
              str(release / folders[0].name),
              archive_format,
              root_dir=dist,
              base_dir=folders[0].name,
          )
          print(archive)
          for package in [*dist.glob("*.whl"), *dist.glob("*.tar.gz")]:
              shutil.copy2(package, release / package.name)
          PY
          python scripts/checksum_artifacts.py release
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ env.ARTIFACT_NAME }}
          path: release/*
