name: build-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: package wheel+sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - run: python -m pip install -r constraints/release.txt
      - run: python -m pip install --no-deps -e .
      - run: python -m build --no-isolation
      - name: Smoke package artifacts
        shell: bash
        run: |
          python - <<'PY'
          import platform
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          artifacts = {
              "wheel": sorted(Path("dist").glob("*.whl")),
              "sdist": sorted(Path("dist").glob("*.tar.gz")),
          }
          for kind, matches in artifacts.items():
              if len(matches) != 1:
                  raise SystemExit(f"expected one {kind}, found {matches}")

              smoke_root = Path(tempfile.mkdtemp(prefix=f"mildoc-{kind}-smoke-"))
              venv_dir = smoke_root / "venv"
              subprocess.run([sys.executable, "-m", "venv", str(venv_dir)], check=True)

              windows = platform.system() == "Windows"
              bin_dir = venv_dir / ("Scripts" if windows else "bin")
              python = bin_dir / ("python.exe" if windows else "python")
              suffix = ".exe" if windows else ""
              mildoc_lint = bin_dir / f"mildoc-lint{suffix}"
              cds_mildoc = bin_dir / f"cds-mildoc{suffix}"

              subprocess.run([str(python), "-m", "pip", "install", str(matches[0])], check=True)
              subprocess.run([str(mildoc_lint), "--version"], check=True, cwd=smoke_root)
              subprocess.run([str(cds_mildoc), "--version"], check=True, cwd=smoke_root)
              subprocess.run([str(python), "-I", "-m", "cds_mildoc", "--version"], check=True, cwd=smoke_root)
          PY
      - run: python -m pytest -q
      - run: ruff check .
      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected=$(python - <<'PY'
          from cds_mildoc._version import __version__

          print(f"v{__version__}")
          PY
          )
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "expected tag $expected but got $GITHUB_REF_NAME"
            exit 1
          fi
      - run: python scripts/checksum_artifacts.py dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-python-packages
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

  build:
    name: build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
            platform: linux
            arch: x64
          - label: windows-x64
            os: windows-latest
            platform: windows
            arch: x64
          - label: macos-x64
            os: macos-13
            platform: macos
            arch: x64
          - label: macos-arm64
            os: macos-14
            platform: macos
            arch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Validate runner architecture
        shell: bash
        run: |
          python scripts/build_binary.py --validate-native-tags --platform-tag "${{ matrix.platform }}" --arch-tag "${{ matrix.arch }}"
      - run: python -m pip install -r constraints/release.txt
      - run: python -m pip install --no-deps -e .
      - run: python -m pytest -q
      - run: ruff check .
      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected=$(python - <<'PY'
          from cds_mildoc._version import __version__

          print(f"v{__version__}")
          PY
          )
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "expected tag $expected but got $GITHUB_REF_NAME"
            exit 1
          fi
      - run: mildoc-lint --version
      - run: cds-mildoc --version
      - run: mildoc-lint lint examples --profile all --fail-on blocker
      - run: python scripts/build_binary.py --platform-tag "${{ matrix.platform }}" --arch-tag "${{ matrix.arch }}"
      - name: Validate artifact name
        shell: bash
        run: |
          artifact="mildoc-lint-${{ matrix.label }}"
          if [ ! -d "dist/$artifact" ]; then
            echo "missing dist/$artifact"
            exit 1
          fi
          echo "ARTIFACT_NAME=$artifact" >> "$GITHUB_ENV"
      - name: Smoke built executable
        shell: bash
        run: |
          exe=$(python - <<'PY'
          import platform
          from pathlib import Path

          artifact_dir = Path("dist") / "${{ env.ARTIFACT_NAME }}"
          exe_name = "mildoc-lint.exe" if platform.system() == "Windows" else "mildoc-lint"
          exe = artifact_dir / exe_name
          if not exe.is_file():
              raise SystemExit(f"built executable not found: {exe}")
          print(exe.as_posix())
          PY
          )
          "$exe" --version
          "$exe" lint examples --profile all --fail-on blocker
      - run: python scripts/package_release_artifacts.py dist release
      - name: Checksum artifact
        shell: bash
        run: |
          python scripts/checksum_artifacts.py release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-${{ env.ARTIFACT_NAME }}
          path: release/*
