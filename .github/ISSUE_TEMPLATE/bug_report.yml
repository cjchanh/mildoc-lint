name: Bug report
description: Report a reproducible mildoc-lint defect using synthetic data only.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not submit CUI, PII, real unit documents, customer data, controlled technical data, operational details, or non-public checklist content.
        Use synthetic examples only.
  - type: input
    id: version
    attributes:
      label: mildoc-lint version
      placeholder: "mildoc-lint 0.2.1"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command using synthetic paths and filenames.
      render: bash
    validations:
      required: true
  - type: textarea
    id: synthetic_input
    attributes:
      label: Synthetic input or fixture
      description: Include only synthetic text needed to reproduce the issue.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Data boundary
      options:
        - label: I confirm this report contains only synthetic data.
          required: true
        - label: I confirm this report does not ask mildoc-lint to certify compliance, determine classification, or decide whether content is actually CUI.
          required: true
